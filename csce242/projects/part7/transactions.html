<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TrustPay — Transactions</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    

    .transactions-hero {
      padding: 70px 0 80px;
      background: var(--bg-section); 
    }

    .transactions-title {
      font-size: 42px;
      font-weight: 900;
      margin: 0 0 8px;
    }

    .transactions-sub {
      color: var(--blue-electric);
      font-size: 18px;
      margin-bottom: 40px;
    }

    .transactions-wrapper {
      max-width: 1200px;
      margin: 0 auto;
    }

    .transactions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 16px;
    }

    .transactions-table thead th {
      text-align: left;
      padding: 20px 12px;
      font-weight: 800;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .transactions-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s ease;
    }

    .transactions-table tbody tr:hover {
      background: rgba(255,255,255,0.05);
    }

    .transactions-table td {
      padding: 24px 12px;
      color: var(--text-white);
    }

    .amount {
      text-align: right;
      font-weight: 800;
    }

    .negative {
      color: #ff9aa2;
    }

    .positive {
      color: #8ff2a6;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="container header-inner">

    <div class="brand">
      <img src="../../images/logo.png" alt="TrustPay logo" class="logo">
      <span class="brand-name">TrustPay</span>
    </div>

    <nav class="main-nav">

      <button id="hamburger" class="hamburger" aria-expanded="false" aria-controls="mobileMenu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div id="mobileMenu" class="mobile-menu" aria-hidden="true">
        <a href="index.html" class="nav-item">Home</a>
        <a href="wallet.html" class="nav-item">Wallet</a>
        <a href="transactions.html" class="nav-item home">Transactions</a>
        <a href="learn.html" class="nav-item">Learn</a>
        <a href="support.html" class="nav-item">Support</a>
      </div>

      <div class="desktop-menu">
        <a href="index.html" class="nav-item">Home</a>
        <a href="wallet.html" class="nav-item">Wallet</a>
        <a href="transactions.html" class="nav-item home">Transactions</a>
        <a href="learn.html" class="nav-item">Learn</a>
        <a href="support.html" class="nav-item">Support</a>
      </div>

    </nav>
  </div>
</header>

<main>

  <section class="transactions-hero">
    <div class="transactions-wrapper">

      <h1 class="transactions-title">Transactions Overview</h1>
      <p class="transactions-sub">Simulated transactions used for demo and learning</p>

      <table class="transactions-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Merchant</th>
            <th>Category</th>
            <th class="amount">Amount</th>
          </tr>
        </thead>

        <tbody id="transactions-body">
          <tr><td colspan="4">Loading transactions…</td></tr>
        </tbody>
      </table>

    </div>
  </section>

</main>

<footer class="site-footer">
  © 2026 TrustPay — Demo
</footer>

<script>
  const JSON_PATH = "https://mahipatelr.github.io/csce242/json/transactions.json";
 
  const hamburger = document.getElementById("hamburger");
  const mobileMenu = document.getElementById("mobileMenu");

  hamburger.addEventListener("click", () => {
    const isOpen = hamburger.classList.toggle("open");
    mobileMenu.classList.toggle("open");
    mobileMenu.setAttribute("aria-hidden", !isOpen);
    hamburger.setAttribute("aria-expanded", isOpen);
  });

  function escapeHtml(str){
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>"']/g, ch =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])
    );
  }

  function formatAmount(n){
    const num = Number(n) || 0;
    const formatted = new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Math.abs(num));
    const cls = num < 0 ? 'negative' : 'positive';
    const sign = num < 0 ? '-' : '+';
    return { text: `${sign}${formatted}`, cls };
  }

  async function showTransactions(){
    const tbody = document.getElementById('transactions-body');
    if (!tbody) return console.error('No #transactions-body element found.');

    try {
      const resp = await fetch(JSON_PATH);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      tbody.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">No transactions found.</td></tr>';
        return;
      }

      const rows = data.map(item => {
        const date = escapeHtml(item.date || '');
        const merchant = escapeHtml(item.merchant || '');
        const category = escapeHtml(item.category || '');
        const { text: amountText, cls: amtClass } = formatAmount(item.amount);

        return `
          <tr>
            <td>${date}</td>
            <td>${merchant}</td>
            <td>${category}</td>
            <td class="amount ${amtClass}">${amountText}</td>
          </tr>
        `;
      }).join('\n');

      tbody.innerHTML = rows;

    } catch (err) {
      console.error('Error loading transactions:', err);
      tbody.innerHTML = `<tr><td colspan="4" style="color:crimson">Error loading transactions: ${escapeHtml(err.message)}</td></tr>`;
    }
  }


  window.addEventListener('load', showTransactions);
</script>

</body>
</html>
